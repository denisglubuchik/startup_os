name: experimentation-service

on:
  pull_request:
    branches:
      - master
    paths:
      - "experimentation_service/**"
      - "proto/**"
      - ".github/workflows/experimentation-service.yml"
      - ".pre-commit-config.yaml"
  push:
    branches:
      - master
    paths:
      - "experimentation_service/**"
      - "proto/**"
      - ".github/workflows/experimentation-service.yml"
      - ".pre-commit-config.yaml"
  workflow_dispatch:

concurrency:
  group: experimentation-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci-build:
    name: CI image build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        run: echo "CI_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/experimentation-service-ci:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CI image
        uses: docker/build-push-action@v6
        with:
          context: experimentation_service
          target: ci
          tags: ${{ env.CI_IMAGE }}
          push: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: ci-build

    steps:
      - name: Set image name
        run: echo "CI_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/experimentation-service-ci:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "$CI_IMAGE"

      - name: Ruff check
        run: docker run --rm "$CI_IMAGE" uv run ruff check .

      - name: Ruff format check
        run: docker run --rm "$CI_IMAGE" uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: ci-build

    steps:
      - name: Set image name
        run: echo "CI_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/experimentation-service-ci:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "$CI_IMAGE"

      - name: Pytest
        run: docker run --rm "$CI_IMAGE" uv run pytest -m "not e2e"

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Set image name
        run: echo "CI_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/experimentation-service-ci:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "$CI_IMAGE"

      - name: Pytest e2e
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --add-host=host.docker.internal:host-gateway \
            -e TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal \
            "$CI_IMAGE" \
            uv run pytest tests/e2e -m e2e -vv

  runtime-build:
    name: Runtime image build
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: experimentation_service
          target: runtime
          tags: experimentation-service:pr
          load: false
