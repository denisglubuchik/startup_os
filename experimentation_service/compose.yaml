services:
  experimentation_service:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      PG_HOST: postgres
    ports:
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PG_DB:-experimentation}
      POSTGRES_USER: ${PG_USER:-startup_os}
      POSTGRES_PASSWORD: ${PG_PASS:-startup_os}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - experimentation_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-startup_os} -d ${PG_DB:-experimentation}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  experimentation_postgres_data:
